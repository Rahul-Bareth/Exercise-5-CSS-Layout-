<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5</title>
      <style>

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        header {
         position: sticky;
         top: 0;
        }

        nav {
          background-color: rgb(238, 65, 169);
          height: 83px; 
        }

        .container {
          background-color: rgb(118, 228, 71);
          margin: 12px 34px;
          padding: 45px 35px;
          text-align: center; 
        }

        .box {
          height: 70vh;
          width: 45%;        
          display: inline-block;
          margin: 0 12px;
        }

        .box1 {
          background-color: rgb(237, 186, 194);
        }

        .box2 {
          background-color: rgb(56, 69, 211);
        }

        main {
          background: black;
          color: white;
          padding: 34px;
        }

        .text-box {
          border: 2px solid white;
          padding: 34px;
          margin: 50px 10vw;
          border-radius: 20px; 
          text-align: center;
        }

        .floating-circle {
          height: 25px;
          width: 25px;
          background: yellow;
          position: fixed;
          right: 23px;
          bottom: 120px;
          border-radius: 50%;
        }

        footer {
          background-color: rgb(231, 167, 88);
          height: 100px;
        }
      </style>
</head>
<body>

  <header>
    <nav>

    </nav>
  </header>

  <main>

    <div class="container">
      <div class="box box1"></div>
      <div class="box box2"></div>
    </div>

    <div class="text-box">
      <p>Welcome to Sigma Web Development Express</p>
    </div>

    <div class="floating-circle">
    </div>

  </main>

  <footer>

  </footer>

</body>
</html>
